# 프로젝트 도메인 컨텍스트
# 이 파일은 NPD의 domain-expert 에이전트가 참조하는 도메인 특화 정보입니다.

project: "통신사 멤버십 서비스"
mvp_topic: "포인트 한눈에 보기와 알아서 챙겨주는 혜택 도우미"
domain:
  name: "통신사 멤버십 서비스"
  description: >
    통신사가 고객의 이용 실적(요금제, 가입 기간 등)에 따라 등급과 포인트를 부여하고,
    제휴 매장(가맹점) 할인·적립 혜택을 조회·사용하도록 지원하는 고객 리텐션(재이용 유도) 도메인.
    본 MVP는 그 중에서도 고객이 자신의 포인트·등급·혜택을 쉽게 확인하고
    놓친 혜택을 알림으로 안내받는 "조회 및 알림" 영역에 집중함.

background: |
  통신사 멤버십/포인트 프로그램 기획 및 운영 경력 다수.
  이동통신 3사 수준의 대규모 멤버십 가입자(수천만 명) 대상 등급 체계 설계, 제휴 매장(가맹점) 혜택
  프로그램 운영, 포인트 적립·사용·소멸 정책 수립 경험 보유.
  고객센터(상담) 문의 데이터 분석을 통한 "포인트 조회 어려움", "혜택 놓침" 등 주요 불편 유형 파악 경험.
  공정거래위원회 신유형 상품권 표준약관, 소비자 고지 규정 등 포인트 관련 규제 대응 자문 경험.

expertise:
  - "통신사 멤버십 등급 체계 및 포인트 적립/사용 정책 설계"
  - "제휴사(가맹점) 혜택 프로그램 운영 및 정산 구조"
  - "고객 리텐션(재이용 유도) 및 CRM 마케팅 전략"
  - "포인트 유효기간·소멸 정책과 소비자 고지 실무"

regulations:
  - name: "개인정보보호법"
    description: "멤버십 가입자의 개인정보(이용 실적, 위치, 구매 내역 등) 수집·이용·보관 시 동의 및 안전조치 의무"
  - name: "전자상거래 등에서의 소비자보호에 관한 법률"
    description: "포인트를 적립금/마일리지로 볼 경우 유효기간·소멸 고지, 환불 및 소비자 분쟁 처리 기준 적용"
  - name: "신유형 상품권 표준약관 (공정거래위원회)"
    description: "포인트가 상품권과 유사한 성격을 가질 경우 최소 유효기간, 소멸 사전 고지 등 표준약관 준수 필요"
  - name: "통신비밀보호법"
    description: "통신사 특성상 고객 이용 내역과 결합한 혜택 추천 시 통신 관련 정보 보호 의무 준수 필요"
