<svg width="820" height="800" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="800" fill="#f9f9f9"/>
  <text x="410" y="30" text-anchor="middle" font-size="18" font-weight="bold">솔루션 우선순위 매트릭스 (사업가치 x 실현가능성)</text>

  <!-- 사분면 배경 -->
  <rect x="100" y="60" width="325" height="210" fill="#ffe9b3" opacity="0.5"/>
  <rect x="425" y="60" width="325" height="210" fill="#c9f2c9" opacity="0.5"/>
  <rect x="100" y="270" width="325" height="210" fill="#e6e6e6" opacity="0.5"/>
  <rect x="425" y="270" width="325" height="210" fill="#cfe3ff" opacity="0.5"/>

  <!-- 축 -->
  <line x1="100" y1="480" x2="750" y2="480" stroke="#333" stroke-width="2"/>
  <line x1="100" y1="480" x2="100" y2="60" stroke="#333" stroke-width="2"/>
  <line x1="425" y1="60" x2="425" y2="480" stroke="#999" stroke-width="1" stroke-dasharray="6,4"/>
  <line x1="100" y1="270" x2="750" y2="270" stroke="#999" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="425" y="505" text-anchor="middle" font-size="14">실현가능성 (낮음 → 높음)</text>
  <text x="70" y="270" text-anchor="middle" font-size="14" transform="rotate(-90, 70, 270)">사업가치 (낮음 → 높음)</text>

  <!-- 사분면 이름 -->
  <text x="262" y="90" text-anchor="middle" font-size="14" font-weight="bold">Bit Bets (전략 투자)</text>
  <text x="587" y="90" text-anchor="middle" font-size="14" font-weight="bold">No Brainers (즉시 실행)</text>
  <text x="262" y="465" text-anchor="middle" font-size="14" font-weight="bold">Unwise (보류·폐기)</text>
  <text x="587" y="465" text-anchor="middle" font-size="14" font-weight="bold">Utilities (여유 시 실행)</text>

  <!-- No Brainers 영역 점 -->
  <circle cx="460" cy="90" r="9" fill="#1a7a1a"/>
  <text x="474" y="95" font-size="13" font-weight="bold">1</text>
  <circle cx="700" cy="230" r="9" fill="#1a7a1a"/>
  <text x="714" y="235" font-size="13" font-weight="bold">4</text>

  <!-- Bit Bets 영역 점 -->
  <circle cx="220" cy="140" r="9" fill="#b8860b"/>
  <text x="234" y="145" font-size="13" font-weight="bold">2</text>

  <!-- Utilities 영역 점 -->
  <circle cx="460" cy="300" r="7" fill="#0066cc"/>
  <text x="472" y="304" font-size="12">18</text>
  <circle cx="460" cy="360" r="7" fill="#0066cc"/>
  <text x="472" y="364" font-size="12">19</text>

  <!-- Unwise 영역 점 (17개) -->
  <circle cx="130" cy="300" r="6" fill="#888"/><text x="140" y="304" font-size="11">6</text>
  <circle cx="180" cy="300" r="6" fill="#888"/><text x="190" y="304" font-size="11">7</text>
  <circle cx="230" cy="300" r="6" fill="#888"/><text x="240" y="304" font-size="11">13</text>
  <circle cx="280" cy="300" r="6" fill="#888"/><text x="290" y="304" font-size="11">16</text>
  <circle cx="330" cy="300" r="6" fill="#888"/><text x="340" y="304" font-size="11">22</text>
  <circle cx="380" cy="300" r="6" fill="#888"/><text x="390" y="304" font-size="11">10</text>

  <circle cx="130" cy="340" r="6" fill="#888"/><text x="140" y="344" font-size="11">14</text>
  <circle cx="180" cy="340" r="6" fill="#888"/><text x="190" y="344" font-size="11">21</text>

  <circle cx="130" cy="380" r="6" fill="#888"/><text x="140" y="384" font-size="11">3</text>
  <circle cx="180" cy="380" r="6" fill="#888"/><text x="190" y="384" font-size="11">5</text>
  <circle cx="230" cy="380" r="6" fill="#888"/><text x="240" y="384" font-size="11">8</text>
  <circle cx="280" cy="380" r="6" fill="#888"/><text x="290" y="384" font-size="11">9</text>
  <circle cx="330" cy="380" r="6" fill="#888"/><text x="340" y="384" font-size="11">11</text>
  <circle cx="380" cy="380" r="6" fill="#888"/><text x="390" y="384" font-size="11">12</text>

  <circle cx="130" cy="420" r="6" fill="#888"/><text x="140" y="424" font-size="11">15</text>
  <circle cx="180" cy="420" r="6" fill="#888"/><text x="190" y="424" font-size="11">17</text>
  <circle cx="230" cy="420" r="6" fill="#888"/><text x="240" y="424" font-size="11">20</text>

  <!-- 범례 -->
  <text x="100" y="530" font-size="14" font-weight="bold">범례 (번호: 솔루션 후보명)</text>
  <text x="100" y="552" font-size="11">1: 포인트·등급·혜택 한 장 카드</text>
  <text x="100" y="570" font-size="11">2: 지금 나에게 딱 맞는 혜택 알아서 추천</text>
  <text x="100" y="588" font-size="11">3: 매장 가까이 가면 알아서 알려주는 혜택 알림</text>
  <text x="100" y="606" font-size="11">4: 사라지기 전 미리 보여주는 신호등 뱃지</text>
  <text x="100" y="624" font-size="11">5: 손 안 대도 알아서 챙겨주는 혜택 집사</text>
  <text x="100" y="642" font-size="11">6: 믿을 수 있는 숫자만 보여주는 안심 표시</text>
  <text x="100" y="660" font-size="11">7: 여러 창구를 하나로 합친 통합 조회 창구</text>
  <text x="100" y="678" font-size="11">8: 바뀌면 바로 알아채고 새로 고치는 자동 갱신</text>
  <text x="100" y="696" font-size="11">9: 미리 예상해서 먼저 준비해두는 예측형 준비</text>
  <text x="100" y="714" font-size="11">10: 놓친 혜택을 돈으로 환산해 보여주는 유료 리포트</text>
  <text x="100" y="732" font-size="11">11: 결제하자마자 바로 알려주는 혜택 알림</text>

  <text x="440" y="552" font-size="11">12: 사라지기 전에 자동으로 담아두는 포인트 장바구니</text>
  <text x="440" y="570" font-size="11">13: 법으로 정한 안내문을 눈에 잘 띄게 보여주기</text>
  <text x="440" y="588" font-size="11">14: 안내문을 결제 전에 미리 보여주기</text>
  <text x="440" y="606" font-size="11">15: 포인트를 가족과 나누거나 기부하는 장터</text>
  <text x="440" y="624" font-size="11">16: 곧 사라질 포인트를 미리 예측해서 알려주는 똑똑한 알림</text>
  <text x="440" y="642" font-size="11">17: 물어보면 대답해주는 대화형 혜택 안내</text>
  <text x="440" y="660" font-size="11">18: 먼저 보여주고 뒤에서 조용히 최신 정보로 바꾸기</text>
  <text x="440" y="678" font-size="11">19: 잘못될 수 있는 모든 경우를 미리 테스트해두기</text>
  <text x="440" y="696" font-size="11">20: 이상한 점을 발견한 고객에게 포인트로 보상하기</text>
  <text x="440" y="714" font-size="11">21: 한 시스템이 고장나도 다른 정보는 계속 보여주기</text>
  <text x="440" y="732" font-size="11">22: 새 버전을 조금씩 안전하게 내보내는 배포 방식</text>

  <text x="100" y="770" font-size="11" fill="#555">초록 점: No Brainers, 갈색 점: Bit Bets, 파란 점: Utilities, 회색 점: Unwise</text>
</svg>
